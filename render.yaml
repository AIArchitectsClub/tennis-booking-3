services:
  - type: web
    name: courtside-tennis-booking
    runtime: node
    plan: free
    region: virginia
    buildCommand: npm install && npm run build && npm run db:setup
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
